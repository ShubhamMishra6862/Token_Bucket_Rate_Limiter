spring.application.name=ratelimiter

server.port=8081

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
springdoc.swagger-ui.tags-sorter= alpha
# Redis Configuration (Updated to use new property names)
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000

# JMX Configuration - Prevent MBean registration conflicts
spring.jmx.enabled=true
spring.jmx.registration-policy=ignore_existing
spring.jmx.export.exclude-beans=jedisPool

# Rate Limiter Configuration
rate-limiter.capacity=10
rate-limiter.refill-rate=5
rate-limiter.api-server-url=http://rate-limiter-app:8081
rate-limiter.timeout=2000



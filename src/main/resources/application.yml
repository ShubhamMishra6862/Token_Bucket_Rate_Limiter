spring:
  application:
    name: ratelimiter

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      ssl:
        enabled: ${REDIS_SSL:true}

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true

  jmx:
    enabled: true
    registration-policy: ignore_existing
    export:
      exclude-beans: jedisPool

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    tags-sorter: alpha

rate-limiter:
  capacity: 10
  refill-rate: 5
  timeout: 2000
  api-server-url: ${APP_URL:http://localhost:8081}